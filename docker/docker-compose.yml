version: '3.8'

services:
  aurora-mcp:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: aurora-mcp-server
    ports:
      - "8000:8000"
    volumes:
      # Mount source code for development
      - ../src:/app/src
      - ../tests:/app/tests
      # Mount project workspace
      - ./workspace:/opt/aurora-os/projects
      # Mount PSDK if available locally
      - ./psdk:/opt/aurora-os/psdk:ro
      # Mount SFDK if available locally  
      - ./sfdk:/opt/aurora-os/sfdk:ro
    environment:
      - AURORA_MCP_DEBUG=1
      - AURORA_MCP_LOG_LEVEL=DEBUG
      - FASTMCP_LOG_LEVEL=DEBUG
      - MCP_BUILD_TOOL=sfdk
      - SFDK_AURORA=/opt/aurora-os/sfdk
      - PSDK_AURORA=/opt/aurora-os/psdk
    networks:
      - aurora-dev

  # Optional: Development tools container
  aurora-dev-tools:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: aurora-dev-tools
    volumes:
      - ../src:/app/src
      - ./workspace:/opt/aurora-os/projects
    entrypoint: ["sleep", "infinity"]
    networks:
      - aurora-dev

networks:
  aurora-dev:
    driver: bridge

volumes:
  aurora-workspace:
  aurora-psdk: